apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: apps
  labels:
    app: app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: app1
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app1-html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: app1-html
          configMap:
            name: app1-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app1-html
  namespace: apps
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>App1 - Inception of Things</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                text-align: center;
                padding: 50px;
                margin: 0;
            }
            .container {
                background: rgba(255,255,255,0.1);
                padding: 30px;
                border-radius: 10px;
                backdrop-filter: blur(10px);
            }
            h1 { font-size: 3em; margin-bottom: 20px; }
            p { font-size: 1.2em; }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🚀 Application 1</h1>
            <p>Bienvenue sur l'Application 1 !</p>
            <p>Host: app1.com</p>
            <p>Partie 2 - IoT Project</p>
        </div>
    </body>
    </html>
