apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2
  namespace: apps
  labels:
    app: app2
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app2
  template:
    metadata:
      labels:
        app: app2
    spec:
      containers:
        - name: app2
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app2-html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: app2-html
          configMap:
            name: app2-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app2-html
  namespace: apps
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>App2 - Inception of Things</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
                color: white;
                text-align: center;
                padding: 50px;
                margin: 0;
            }
            .container {
                background: rgba(255,255,255,0.1);
                padding: 30px;
                border-radius: 10px;
                backdrop-filter: blur(10px);
            }
            h1 { font-size: 3em; margin-bottom: 20px; }
            p { font-size: 1.2em; }
            .replica-info {
                background: rgba(0,0,0,0.3);
                padding: 10px;
                border-radius: 5px;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>⚡ Application 2</h1>
            <p>Bienvenue sur l'Application 2 !</p>
            <p>Host: app2.com</p>
            <div class="replica-info">
                <p>🔄 Cette application fonctionne avec 3 replicas</p>
                <p>Load Balancing automatique</p>
            </div>
            <p>Partie 2 - IoT Project</p>
        </div>
    </body>
    </html>
