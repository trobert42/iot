apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3
  namespace: apps
  labels:
    app: app3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3
  template:
    metadata:
      labels:
        app: app3
    spec:
      containers:
        - name: app3
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app3-html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: app3-html
          configMap:
            name: app3-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app3-html
  namespace: apps
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>App3 - Inception of Things</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
                color: white;
                text-align: center;
                padding: 50px;
                margin: 0;
            }
            .container {
                background: rgba(255,255,255,0.1);
                padding: 30px;
                border-radius: 10px;
                backdrop-filter: blur(10px);
            }
            h1 { font-size: 3em; margin-bottom: 20px; }
            p { font-size: 1.2em; }
            .default-info {
                background: rgba(0,0,0,0.3);
                padding: 10px;
                border-radius: 5px;
                margin-top: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>🏠 Application 3</h1>
            <p>Bienvenue sur l'Application par Défaut !</p>
            <div class="default-info">
                <p>🎯 Cette application s'affiche par défaut</p>
                <p>Accès direct via IP : 192.168.56.110</p>
            </div>
            <p>Partie 2 - IoT Project</p>
        </div>
    </body>
    </html>
